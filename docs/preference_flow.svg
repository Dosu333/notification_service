<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" width="600" height="480" font-family="ui-monospace, Menlo, monospace">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="ah-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="600" height="480" rx="14" fill="#0f172a"/>

  <text x="300" y="24" text-anchor="middle" dominant-baseline="central" fill="#475569" font-size="11" font-weight="bold" letter-spacing="2">INGESTION &amp; DOMAIN SHIELD FLOW</text>

  <path id="v0" d="M220,71 V90"  stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>
  <path id="v1" d="M220,140 V160" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>
  <path id="v2" d="M220,210 V230" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>
  <path id="v3" d="M220,280 V300" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>
  <path id="v4" d="M220,350 V380" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>

  <path id="h1" d="M300,115 H360" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#ah-r)"/>
  <path id="h2" d="M300,185 H360" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#ah-r)"/>
  <path id="h3" d="M300,255 H360" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#ah-r)"/>
  <path id="h4" d="M300,325 H360" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#ah-r)"/>

  <rect x="130" y="35" width="180" height="36" rx="8" fill="#172040" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="220" y="53" text-anchor="middle" dominant-baseline="central" fill="#93c5fd" font-size="12" font-weight="600">POST /notifications</text>

  <path d="M220,90 L300,115 L220,140 L140,115 Z" fill="#1a1a2e" stroke="#ef4444" stroke-width="1.5"/>
  <text x="220" y="110" text-anchor="middle" dominant-baseline="central" fill="#fca5a5" font-size="10" font-weight="600">Rate Limit</text>
  <text x="220" y="123" text-anchor="middle" dominant-baseline="central" fill="#fca5a5" font-size="10" font-weight="600">under 100/min?</text>

  <path d="M220,160 L300,185 L220,210 L140,185 Z" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="220" y="180" text-anchor="middle" dominant-baseline="central" fill="#fcd34d" font-size="10" font-weight="600">Idempotency</text>
  <text x="220" y="193" text-anchor="middle" dominant-baseline="central" fill="#fcd34d" font-size="10" font-weight="600">is new key?</text>

  <path d="M220,230 L300,255 L220,280 L140,255 Z" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="220" y="250" text-anchor="middle" dominant-baseline="central" fill="#c4b5fd" font-size="10" font-weight="600">Domain Shield</text>
  <text x="220" y="263" text-anchor="middle" dominant-baseline="central" fill="#c4b5fd" font-size="10" font-weight="600">quota &amp; prefs OK?</text>

  <path d="M220,300 L300,325 L220,350 L140,325 Z" fill="#1a1a2e" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="220" y="320" text-anchor="middle" dominant-baseline="central" fill="#67e8f9" font-size="10" font-weight="600">Scheduling</text>
  <text x="220" y="333" text-anchor="middle" dominant-baseline="central" fill="#67e8f9" font-size="10" font-weight="600">future date?</text>

  <rect x="140" y="380" width="160" height="40" rx="8" fill="#05201a" stroke="#10b981" stroke-width="1.5"/>
  <text x="220" y="394" text-anchor="middle" dominant-baseline="central" fill="#6ee7b7" font-size="13" font-weight="700">✓ 202 ACCEPTED</text>
  <text x="220" y="408" text-anchor="middle" dominant-baseline="central" fill="#34d399" font-size="9">status: QUEUED (Outbox)</text>

  <rect x="360" y="98" width="180" height="34" rx="8" fill="#2a1010" stroke="#ef4444" stroke-width="1.5"/>
  <text x="450" y="115" text-anchor="middle" dominant-baseline="central" fill="#fca5a5" font-size="11" font-weight="600">HTTP 429: Too Many Req</text>

  <rect x="360" y="168" width="180" height="34" rx="8" fill="#231a05" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="180" text-anchor="middle" dominant-baseline="central" fill="#fcd34d" font-size="11" font-weight="600">HTTP 200: OK</text>
  <text x="450" y="192" text-anchor="middle" dominant-baseline="central" fill="#fbbf24" font-size="9">status: ALREADY_PROCESSED</text>

  <rect x="360" y="238" width="180" height="34" rx="8" fill="#231a05" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="250" text-anchor="middle" dominant-baseline="central" fill="#fcd34d" font-size="11" font-weight="600">HTTP 200: OK</text>
  <text x="450" y="262" text-anchor="middle" dominant-baseline="central" fill="#fbbf24" font-size="9">status: SUPPRESSED</text>

  <rect x="360" y="308" width="180" height="34" rx="8" fill="#2d1b4e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="450" y="320" text-anchor="middle" dominant-baseline="central" fill="#d8b4fe" font-size="11" font-weight="600">HTTP 202: ACCEPTED</text>
  <text x="450" y="332" text-anchor="middle" dominant-baseline="central" fill="#c084fc" font-size="9">status: SCHEDULED (Redis ZSET)</text>

  <text x="210" y="80"  text-anchor="middle" fill="#22c55e" font-size="9" font-weight="600">Yes</text>
  <text x="210" y="150" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="600">Yes</text>
  <text x="210" y="220" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="600">Yes</text>
  <text x="210" y="290" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="600">Yes</text> <text x="210" y="365" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="600">Commit</text>

  <text x="330" y="107" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="600">No</text>
  <text x="330" y="177" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="600">No</text>
  <text x="330" y="247" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="600">No</text>
  <text x="330" y="317" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="600">Yes</text>

  <path id="happy" d="M220,71 V90 L220,140 V160 L220,210 V230 L220,280 V300 L220,350 V380" fill="none"/>
  <circle r="4.5" fill="#3b82f6" opacity="0.9">
    <animateMotion dur="4s" repeatCount="indefinite" begin="0s">
      <mpath href="#happy"/>
    </animateMotion>
  </circle>

  <path id="anim-h1" d="M220,71 V90 L300,115 H360" fill="none"/>
  <circle r="4" fill="#f87171" opacity="0.85">
    <animateMotion dur="3s" repeatCount="indefinite" begin="1s">
      <mpath href="#anim-h1"/>
    </animateMotion>
  </circle>

  <path id="anim-h2" d="M220,71 V90 L220,140 V160 L300,185 H360" fill="none"/>
  <circle r="4" fill="#fbbf24" opacity="0.85">
    <animateMotion dur="3s" repeatCount="indefinite" begin="2s">
      <mpath href="#anim-h2"/>
    </animateMotion>
  </circle>

  <path id="anim-h3" d="M220,71 V90 L220,140 V160 L220,210 V230 L300,255 H360" fill="none"/>
  <circle r="4" fill="#fbbf24" opacity="0.85">
    <animateMotion dur="3s" repeatCount="indefinite" begin="3s">
      <mpath href="#anim-h3"/>
    </animateMotion>
  </circle>

  <path id="anim-h4" d="M220,71 V90 L220,140 V160 L220,210 V230 L220,280 V300 L300,325 H360" fill="none"/>
  <circle r="4" fill="#c084fc" opacity="0.85">
    <animateMotion dur="3s" repeatCount="indefinite" begin="2.5s">
      <mpath href="#anim-h4"/>
    </animateMotion>
  </circle>

  <circle cx="28" cy="450" r="4.5" fill="#3b82f6"/>
  <text x="40" y="450" dominant-baseline="central" fill="#475569" font-size="9">Instant Dispatch (Outbox)</text>
  
  <circle cx="205" cy="450" r="4" fill="#f87171"/>
  <text x="217" y="450" dominant-baseline="central" fill="#475569" font-size="9">Error / Dropped</text>
  
  <circle cx="315" cy="450" r="4" fill="#fbbf24"/>
  <text x="327" y="450" dominant-baseline="central" fill="#475569" font-size="9">Graceful Suppression</text>

  <circle cx="455" cy="450" r="4" fill="#c084fc"/>
  <text x="467" y="450" dominant-baseline="central" fill="#475569" font-size="9">Time-Travel (Redis ZSET)</text>
</svg>
