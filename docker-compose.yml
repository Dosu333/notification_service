services:
  postgres:
    image: postgres:15-alpine
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "6432:6432"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p ${LISTEN_PORT} -U ${DB_USER}"]
      interval: 3s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
    ports:
      - "19092:19092" # Kafka API
      - "18082:18082" # HTTP Proxy
      - "9644:9644"   # Admin API
  
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
  
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: 
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && 
             uvicorn src.apps.api.main:app --host 0.0.0.0 --port 8000"

  outbox_publisher:
    build: .
    env_file: 
      - ./.env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_started
    command: ["python", "-m", "src.apps.workers.outbox_publisher"]
    restart: always

  dispatcher:
    build: .
    env_file: 
      - ./.env
    depends_on:
      api:
        condition: service_started
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_started
    command: ["python", "-m", "src.apps.workers.dispatcher"]

  sms_worker:
    build: .
    env_file: 
      - ./.env
    depends_on:
      api:
        condition: service_started
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_started
    command: ["python", "-m", "src.apps.workers.sms_worker"]

  email_worker:
    build: .
    env_file: 
      - ./.env
    depends_on:
      api:
        condition: service_started
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_started
    command: ["python", "-m", "src.apps.workers.email_worker"]
    
  push_worker:
    build: .
    env_file: 
      - ./.env
    depends_on:
      api:
        condition: service_started
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_started
    command: ["python", "-m", "src.apps.workers.push_worker"]
  
  scheduler_worker:
    build: .
    env_file: 
      - ./.env
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_started
    command: ["python", "-m", "src.apps.workers.scheduler_worker"]
    restart: always

volumes:
  pg_data: